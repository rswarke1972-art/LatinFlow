<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz | IndieFlow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="goBack()">⬅ Back</button>
  <h2 id="langTitle">Loading...</h2>
</div>

<div class="container">
  <h1>Quiz 🧪</h1>

  <!-- QUIZ TYPES -->
  <div class="quiz-types">
    <button onclick="setQuizType('wordToMeaning')">Word → Meaning</button>
    <button onclick="setQuizType('meaningToWord')">Meaning → Word</button>
  </div>

  <h2 id="score">Score: 0</h2>

  <h2 id="question">...</h2>

  <div id="options"></div>

  <p id="result"></p>

  <button id="nextBtn" onclick="nextQuestion()" style="display:none;">
    Next
  </button>
</div>

<script src="config.js"></script>
<script src="quiz.js"></script>

<script>
function goBack() {
  window.history.back();
}

function setQuizType(type) {
  localStorage.setItem("quizType", type);
  location.reload();
}
</script>

</body>
</html>
