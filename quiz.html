<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz | LatinFlow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="goBack()">⬅ Back</button>
  <h2 id="langTitle">Loading...</h2>
</div>

<div class="container">
  <h1>Quiz 🧪</h1>

  <!-- QUIZ TYPES -->
  <div class="quiz-types">
    <button id="quiztype-wordToMeaning" onclick="changeQuizType('wordToMeaning')">Word → Meaning</button>
    <button id="quiztype-meaningToWord" onclick="changeQuizType('meaningToWord')">Meaning → Word</button>
  </div>

  <h2 id="score">Score: 0</h2>

  <h2 id="question">...</h2>

  <div id="options"></div>

  <p id="result"></p>

  <button id="nextBtn" onclick="nextQuestion()" style="display:none;">
    Next
  </button>
</div>

<script src="config.js"></script>
<script src="quiz.js"></script>

<script>
function goBack() {
  window.history.back();
}
</script>

</body>
</html>
