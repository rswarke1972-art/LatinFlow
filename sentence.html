<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentence Builder | LatinFlow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="goBack()">⬅ Back</button>
  <h2 id="langTitle">Loading...</h2>
</div>

<div class="container">

  <h1>Sentence Builder 🧩</h1>

  <!-- TENSE SELECT -->
  <div class="tense-buttons">
    <button id="tense-present" onclick="changeTense('present')">Present</button>
    <button id="tense-past" onclick="changeTense('past')">Past</button>
    <button id="tense-future" onclick="changeTense('future')">Future</button>
  </div>

  <!-- ENGLISH SENTENCE -->
  <h2 id="englishSentence">Loading...</h2>

  <!-- SELECTED WORDS -->
  <div id="selectedWords" class="drop-zone"></div>

  <!-- WORD BANK -->
  <div id="wordBank" class="word-bank"></div>

  <p id="result"></p>

  <!-- ACTIONS -->
  <button class="action-btn" onclick="checkSentence()">Check</button>

  <div class="nav-buttons">
    <button onclick="prevSentence()">⬅️ Previous</button>
    <button onclick="nextSentence()">Next ➡️</button>
  </div>

</div>

<script src="config.js"></script>
<script src="sentence.js"></script>

<script>
function goBack() {
  window.history.back();
}
</script>

</body>
</html>
